<style>
  :root {
    --naranja: #d97706; --naranja-claro: #fef3c7; --naranja-borde: #f59e0b;
    --azul-oscuro: #1e293b; --texto: #374151; --texto-suave: #6b7280;
    --borde: #e5e7eb; --fondo: #fafaf9; --blanco: #ffffff;
    --verde: #166534; --verde-bg: #f0fdf4; --verde-borde: #86efac;
    --rojo: #991b1b; --rojo-bg: #fef2f2; --rojo-borde: #fca5a5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--fondo); color: var(--texto); min-height: 100vh; font-size: 16px; line-height: 1.6; }
  header { background: var(--blanco); border-bottom: 1px solid var(--borde); }
  .header-top { max-width: 860px; margin: 0 auto; padding: 1.4rem 1.5rem 1rem; display: flex; align-items: flex-start; gap: 1.2rem; }
  .header-logo { width: 48px; height: 48px; border-radius: 8px; object-fit: contain; flex-shrink: 0; }
  .header-textos { flex: 1; }
  .header-site { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--naranja); font-weight: 600; margin-bottom: 3px; }
  .header-titulo { font-family: 'Lora', serif; font-size: clamp(1.15rem, 3vw, 1.65rem); font-weight: 700; color: var(--azul-oscuro); line-height: 1.2; }
  .header-sub { font-size: 0.88rem; color: var(--texto-suave); margin-top: 4px; }
  .header-meta { background: var(--naranja-claro); border-top: 1px solid #fde68a; padding: 0.55rem 1.5rem; }
  .header-meta-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; font-size: 0.83rem; color: #92400e; font-weight: 500; }
  .barra-wrap { position: sticky; top: 0; z-index: 100; background: var(--blanco); border-bottom: 1px solid var(--borde); padding: 0.6rem 1.5rem; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
  .barra-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; }
  .barra-track { flex: 1; height: 6px; background: #f3f4f6; border-radius: 99px; overflow: hidden; }
  .barra-fill { height: 100%; background: var(--naranja); border-radius: 99px; transition: width 0.35s ease; width: 0%; }
  .barra-num { font-size: 13px; font-weight: 600; color: var(--azul-oscuro); white-space: nowrap; min-width: 52px; }
  .barra-score { font-size: 13px; color: var(--texto-suave); white-space: nowrap; }
  .barra-score .ok { color: var(--verde); font-weight: 600; }
  .barra-score .ko { color: var(--rojo); font-weight: 600; }
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
  .card { background: var(--blanco); border: 1px solid var(--borde); border-radius: 10px; padding: 1.5rem 1.6rem; margin-bottom: 1.4rem; transition: box-shadow 0.2s; }
  .card:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.06); }
  .card-num { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--naranja); margin-bottom: 0.5rem; }
  .card-pregunta { font-family: 'Lora', serif; font-size: 1rem; font-weight: 600; line-height: 1.55; color: var(--azul-oscuro); margin-bottom: 1.1rem; }
  .opciones { display: flex; flex-direction: column; gap: 0.45rem; }
  .opcion { display: flex; align-items: flex-start; gap: 0.7rem; padding: 0.7rem 1rem; border: 1.5px solid var(--borde); border-radius: 7px; cursor: pointer; background: var(--blanco); text-align: left; font-family: 'Source Sans 3', sans-serif; font-size: 0.93rem; color: var(--texto); line-height: 1.5; transition: border-color 0.15s, background 0.15s; width: 100%; }
  .opcion:hover:not(:disabled) { border-color: var(--naranja-borde); background: var(--naranja-claro); }
  .opcion .letra { font-weight: 700; color: var(--naranja); min-width: 18px; font-size: 0.85rem; margin-top: 2px; flex-shrink: 0; }
  .opcion.correcta { border-color: var(--verde-borde); background: var(--verde-bg); color: var(--verde); }
  .opcion.correcta .letra { color: #15803d; }
  .opcion.incorrecta { border-color: var(--rojo-borde); background: var(--rojo-bg); color: var(--rojo); }
  .opcion.incorrecta .letra { color: var(--rojo); }
  .opcion:disabled { cursor: default; }
  .explicacion { display: none; margin-top: 1rem; padding: 0.9rem 1rem 0.9rem 1.1rem; background: #fffbeb; border-left: 3px solid var(--naranja); border-radius: 0 6px 6px 0; font-size: 0.875rem; line-height: 1.65; color: var(--texto); }
  .explicacion.visible { display: block; animation: fadeIn 0.22s ease; }
  .explicacion strong { color: var(--azul-oscuro); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  .resultado { display: none; background: var(--blanco); border: 1px solid var(--borde); border-radius: 12px; padding: 2.5rem 2rem 2rem; margin: 1.5rem 0 2rem; text-align: center; }
  .resultado.visible { display: block; animation: fadeIn 0.3s ease; }
  .resultado-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--naranja); font-weight: 600; margin-bottom: 0.5rem; }
  .resultado h2 { font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 700; color: var(--azul-oscuro); margin-bottom: 0.3rem; }
  .resultado-nota { font-size: 3.2rem; font-weight: 700; color: var(--azul-oscuro); line-height: 1; margin: 1rem 0 0.3rem; font-family: 'Lora', serif; }
  .resultado-nota span { color: var(--naranja); }
  .calif-badge { display: inline-block; padding: 5px 16px; border-radius: 99px; font-size: 0.9rem; font-weight: 600; margin: 0.6rem 0 1.5rem; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 0 0 1.5rem; }
  .stat { background: var(--fondo); border: 1px solid var(--borde); border-radius: 8px; padding: 0.9rem 0.5rem; }
  .stat-num { font-size: 1.9rem; font-weight: 700; font-family: 'Lora', serif; }
  .stat-lab { font-size: 0.78rem; color: var(--texto-suave); margin-top: 2px; }
  .resultado-hint { font-size: 0.85rem; color: var(--texto-suave); margin-bottom: 1.2rem; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 0.7rem 1.6rem; border-radius: 7px; font-family: 'Source Sans 3', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.18s; }
  .btn-naranja { background: var(--naranja); color: white; }
  .btn-naranja:hover { background: #b45309; transform: translateY(-1px); }
  @media (max-width: 580px) { main { padding: 1.2rem 1rem 4rem; } .card { padding: 1.1rem; } .stats { grid-template-columns: 1fr 1fr; } .header-top { padding: 1rem; gap: 0.8rem; } .header-meta { padding: 0.5rem 1rem; } }

<script>
const BANCO = [

  /* ══ LO 3/2007 — TÍTULO PRELIMINAR ══ */
  {
    p: "¿Cuál es el objeto de la Ley Orgánica 3/2007 según su artículo 1.1?",
    ops: [
      "Eliminar exclusivamente la discriminación de la mujer en el ámbito laboral y retributivo",
      "Hacer efectivo el derecho de igualdad de trato y de oportunidades entre mujeres y hombres, en particular mediante la eliminación de la discriminación de la mujer en cualesquiera de los ámbitos de la vida",
      "Regular las medidas de acción positiva en el acceso al empleo público de las mujeres",
      "Garantizar la paridad en todos los órganos de representación política del Estado"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 1.1 LO 3/2007 establece que su objeto es «hacer efectivo el derecho de igualdad de trato y de oportunidades entre mujeres y hombres, en particular mediante la eliminación de la discriminación de la mujer, sea cual fuere su circunstancia o condición, en cualesquiera de los ámbitos de la vida», desarrollando los artículos 9.2 y 14 de la Constitución."
  },
  {
    p: "El artículo 1.1 de la LO 3/2007 cita expresamente dos artículos constitucionales como base de la ley. ¿Cuáles son?",
    ops: [
      "Artículos 14 y 23 de la Constitución",
      "Artículos 9.2 y 14 de la Constitución",
      "Artículos 9.2 y 35 de la Constitución",
      "Artículos 14 y 15 de la Constitución"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 1.1 LO 3/2007 fundamenta la ley «en el desarrollo de los artículos 9.2 y 14 de la Constitución». El art. 9.2 CE impone a los poderes públicos promover la igualdad real y efectiva; el art. 14 CE consagra el principio de igualdad y la prohibición de discriminación por razón de sexo, entre otras causas."
  },
  {
    p: "¿A quién se aplican las obligaciones de la LO 3/2007 según su artículo 2.2?",
    ops: [
      "Solo a las personas físicas y jurídicas de nacionalidad española",
      "A toda persona, física o jurídica, que se encuentre o actúe en territorio español, cualquiera que fuese su nacionalidad, domicilio o residencia",
      "Exclusivamente a las Administraciones Públicas y entidades del sector público",
      "A los ciudadanos españoles y a los extranjeros residentes legalmente en España"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 2.2 LO 3/2007 establece que «las obligaciones establecidas en esta Ley serán de aplicación a toda persona, física o jurídica, que se encuentre o actúe en territorio español, cualquiera que fuese su nacionalidad, domicilio o residencia». El criterio es territorial, no de nacionalidad."
  },

  /* ══ LO 3/2007 — TÍTULO I ══ */
  {
    p: "El artículo 3 de la LO 3/2007 define el principio de igualdad de trato. ¿Qué situaciones menciona expresamente como origen de posible discriminación?",
    ops: [
      "La edad, la orientación sexual y el origen étnico",
      "La maternidad, la asunción de obligaciones familiares y el estado civil",
      "El embarazo, la lactancia y la excedencia por cuidado de hijos",
      "El estado civil, la religión y las convicciones políticas"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 3 LO 3/2007 dispone que el principio de igualdad de trato supone la ausencia de toda discriminación directa o indirecta por razón de sexo, «y, especialmente, las derivadas de la maternidad, la asunción de obligaciones familiares y el estado civil». Estos tres supuestos gozan de mención expresa en la ley."
  },
  {
    p: "Según el artículo 4 de la LO 3/2007, ¿cuál es el carácter que tiene el principio de igualdad en el ordenamiento jurídico?",
    ops: [
      "Es un principio programático de aplicación exclusivamente en el ámbito público",
      "Es un principio informador del ordenamiento jurídico que se integrará y observará en la interpretación y aplicación de las normas jurídicas",
      "Es una norma de rango constitucional que prevalece sobre cualquier otra norma",
      "Es un principio rector de la política social y económica sin valor normativo directo"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 4 LO 3/2007 establece que «la igualdad de trato y de oportunidades entre mujeres y hombres es un principio informador del ordenamiento jurídico y, como tal, se integrará y observará en la interpretación y aplicación de las normas jurídicas». Tiene efecto transversal sobre todo el ordenamiento."
  },
  {
    p: "¿Cómo define el artículo 6.1 de la LO 3/2007 la discriminación directa por razón de sexo?",
    ops: [
      "La situación en que una disposición, criterio o práctica aparentemente neutros pone a personas de un sexo en desventaja",
      "Cualquier trato desfavorable a las mujeres relacionado con el embarazo o la maternidad",
      "La situación en que una persona sea, haya sido o pudiera ser tratada, en atención a su sexo, de manera menos favorable que otra en situación comparable",
      "Todo comportamiento de naturaleza sexual que atente contra la dignidad de una persona"
    ],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 6.1 LO 3/2007 define la discriminación directa como «la situación en que se encuentra una persona que sea, haya sido o pudiera ser tratada, en atención a su sexo, de manera menos favorable que otra en situación comparable». La fórmula incluye el potencial («pudiera ser»), ampliando la protección."
  },
  {
    p: "El artículo 6.2 de la LO 3/2007 define la discriminación indirecta. ¿Cuándo se puede justificar una disposición, criterio o práctica aparentemente neutra que perjudica a un sexo?",
    ops: [
      "Cuando la decisión empresarial sea adoptada de buena fe y sin intención discriminatoria",
      "Cuando pueda justificarse objetivamente en atención a una finalidad legítima y los medios para alcanzarla sean necesarios y adecuados",
      "Cuando así lo haya establecido un convenio colectivo negociado con representación sindical paritaria",
      "Cuando la diferencia de trato beneficie al sexo menos representado en la empresa o institución"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 6.2 LO 3/2007 establece que la discriminación indirecta se produce salvo que la disposición, criterio o práctica «puedan justificarse objetivamente en atención a una finalidad legítima y que los medios para alcanzar dicha finalidad sean necesarios y adecuados». Son tres los requisitos acumulativos: finalidad legítima, medios necesarios y medios adecuados."
  },
  {
    p: "¿Qué establece el artículo 6.3 de la LO 3/2007 respecto a las órdenes de discriminar?",
    ops: [
      "Solo se consideran discriminatorias si tienen efecto real y demostrable sobre una persona concreta",
      "Son discriminatorias únicamente cuando las dicta quien tiene autoridad sobre el discriminado",
      "En cualquier caso, se considera discriminatoria toda orden de discriminar, directa o indirectamente, por razón de sexo",
      "Se consideran discriminatorias solo si van acompañadas de una sanción por incumplimiento"
    ],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 6.3 LO 3/2007 es categórico: «en cualquier caso, se considera discriminatoria toda orden de discriminar, directa o indirectamente, por razón de sexo». La orden en sí misma es discriminatoria, con independencia de si llega a ejecutarse o de quién la imparte."
  },
  {
    p: "El artículo 7 de la LO 3/2007 distingue entre acoso sexual y acoso por razón de sexo. ¿Cuál es la diferencia fundamental entre ambos?",
    ops: [
      "El acoso sexual exige siempre contacto físico; el acoso por razón de sexo puede ser únicamente verbal",
      "El acoso sexual es de naturaleza sexual; el acoso por razón de sexo se realiza en función del sexo de la persona, sin que el comportamiento tenga carácter sexual",
      "El acoso sexual solo se produce entre personas con relación laboral; el acoso por razón de sexo puede ocurrir en cualquier ámbito",
      "El acoso sexual requiere reiteración de conductas; el acoso por razón de sexo puede ser un acto único"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 7 LO 3/2007 distingue: el acoso sexual (art. 7.1) es «cualquier comportamiento, verbal o físico, de naturaleza sexual» que atente contra la dignidad; el acoso por razón de sexo (art. 7.2) es «cualquier comportamiento realizado en función del sexo de una persona» que atente contra su dignidad. La diferencia es que el primero tiene naturaleza sexual y el segundo no necesariamente."
  },
  {
    p: "El artículo 7.4 de la LO 3/2007 contempla una situación específica de discriminación. ¿Cuál es?",
    ops: [
      "El despido de una trabajadora durante el periodo de lactancia natural",
      "El condicionamiento de un derecho o expectativa de derecho a la aceptación de una situación constitutiva de acoso sexual o de acoso por razón de sexo",
      "La no renovación de contrato temporal a una trabajadora embarazada",
      "La negativa a conceder un ascenso a una trabajadora que ha ejercido una reducción de jornada"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 7.4 LO 3/2007 establece que «el condicionamiento de un derecho o de una expectativa de derecho a la aceptación de una situación constitutiva de acoso sexual o de acoso por razón de sexo se considerará también acto de discriminación por razón de sexo». Esto engloba el llamado «chantaje sexual» o acoso de intercambio (quid pro quo)."
  },
  {
    p: "¿Qué dispone el artículo 8 de la LO 3/2007 sobre el embarazo y la maternidad?",
    ops: [
      "Constituye discriminación indirecta por razón de sexo todo trato desfavorable relacionado con el embarazo",
      "Constituye discriminación directa por razón de sexo todo trato desfavorable a las mujeres relacionado con el embarazo o la maternidad",
      "El embarazo y la maternidad son causas de justificación objetiva que permiten diferencias de trato",
      "Solo es discriminación si el trato desfavorable proviene del empresario o empleador directo"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 8 LO 3/2007 establece que «constituye discriminación directa por razón de sexo todo trato desfavorable a las mujeres relacionado con el embarazo o la maternidad». Es discriminación directa (no indirecta) porque el sexo es el motivo inmediato del trato desfavorable."
  },
  {
    p: "El artículo 9 de la LO 3/2007 regula la indemnidad frente a represalias. ¿Qué conductas generan la protección?",
    ops: [
      "Solo la presentación de denuncia ante la Inspección de Trabajo",
      "La presentación de queja, reclamación, denuncia, demanda o recurso, de cualquier tipo, destinados a impedir la discriminación y exigir el cumplimiento del principio de igualdad",
      "Exclusivamente la interposición de demanda judicial por discriminación",
      "La participación como testigo en procedimientos por discriminación de sexo"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 9 LO 3/2007 protege frente a cualquier trato adverso que se produzca «como consecuencia de la presentación por su parte de queja, reclamación, denuncia, demanda o recurso, de cualquier tipo, destinados a impedir su discriminación y a exigir el cumplimiento efectivo del principio de igualdad». La enumeración es amplia y no taxativa."
  },
  {
    p: "El artículo 10 de la LO 3/2007 establece las consecuencias de las conductas discriminatorias. ¿Cuáles son?",
    ops: [
      "Nulidad del acto y sanción administrativa únicamente",
      "Nulidad e ineficacia del acto o cláusula, más responsabilidad mediante reparaciones o indemnizaciones reales, efectivas y proporcionadas, y en su caso sanciones eficaces y disuasorias",
      "Solo responsabilidad penal cuando la conducta esté tipificada como delito",
      "Nulidad relativa del acto, que puede subsanarse mediante acuerdo entre las partes"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 10 LO 3/2007 establece que los actos y cláusulas discriminatorias «se considerarán nulos y sin efecto, y darán lugar a responsabilidad a través de un sistema de reparaciones o indemnizaciones que sean reales, efectivas y proporcionadas al perjuicio sufrido, así como, en su caso, a través de un sistema eficaz y disuasorio de sanciones». Son tres consecuencias: nulidad, reparación/indemnización y sanciones."
  },
  {
    p: "El artículo 11.1 de la LO 3/2007 regula las acciones positivas. ¿Qué condiciones deben cumplir?",
    ops: [
      "Deben ser permanentes e irreversibles para garantizar la igualdad estructural",
      "Deben ser aplicables mientras subsistan situaciones patentes de desigualdad de hecho, y han de ser razonables y proporcionadas al objetivo",
      "Solo pueden ser adoptadas por los Poderes Públicos, nunca por entidades privadas",
      "Deben ser aprobadas por ley orgánica para tener validez jurídica"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 11.1 LO 3/2007 permite a los Poderes Públicos adoptar medidas específicas en favor de las mujeres para corregir situaciones de desigualdad de hecho. Dichas medidas «serán aplicables en tanto subsistan dichas situaciones» (temporalidad) y «habrán de ser razonables y proporcionadas en relación con el objetivo perseguido» (proporcionalidad)."
  },
  {
    p: "Según el artículo 12.3 de la LO 3/2007, ¿quién tiene legitimación exclusiva en los litigios sobre acoso sexual y acoso por razón de sexo?",
    ops: [
      "El Ministerio Fiscal y las asociaciones de mujeres legalmente constituidas",
      "La persona acosada será la única legitimada",
      "Los sindicatos y las organizaciones de defensa de la igualdad",
      "El Instituto de la Mujer o el organismo autonómico equivalente"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 12.3 LO 3/2007 establece que «la persona acosada será la única legitimada en los litigios sobre acoso sexual y acoso por razón de sexo». Esta legitimación exclusiva protege la voluntad y autonomía de la víctima: nadie puede litigar por acoso en su nombre sin su consentimiento."
  },
  {
    p: "El artículo 13.1 de la LO 3/2007 establece la inversión de la carga de la prueba en procedimientos por discriminación. ¿A quién corresponde probar qué?",
    ops: [
      "A la parte actora corresponde probar la discriminación; a la demandada probar el daño sufrido",
      "A la persona demandada corresponde probar la ausencia de discriminación en las medidas adoptadas y su proporcionalidad",
      "La carga de la prueba se distribuye por igual entre actora y demandada",
      "Al órgano judicial corresponde recabar de oficio toda la prueba necesaria"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 13.1 LO 3/2007 establece que, cuando la parte actora fundamente sus alegaciones en actuaciones discriminatorias por razón de sexo, «corresponderá a la persona demandada probar la ausencia de discriminación en las medidas adoptadas y su proporcionalidad». Esta inversión de la carga de la prueba facilita la protección de las víctimas. No se aplica en procesos penales (art. 13.2)."
  },

  /* ══ LEY 9/2003 GVA ══ */
  {

  /* ══ LO 1/2004 — TÍTULO PRELIMINAR ══ */
  {

    ops: [
      "Actuar contra toda forma de violencia doméstica en el ámbito familiar",
      "Actuar contra la violencia que se ejerce sobre las mujeres por parte de quienes sean o hayan sido sus cónyuges o estén o hayan estado ligados a ellas por relaciones similares de afectividad, aun sin convivencia",
      "Proteger a todas las víctimas de violencia de género, independientemente del sexo del agresor",
      "Regular el sistema de órdenes de alejamiento y protección para víctimas de violencia doméstica"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 1.1 LO 1/2004 define su objeto como actuar contra la violencia que «como manifestación de la discriminación, la situación de desigualdad y las relaciones de poder de los hombres sobre las mujeres, se ejerce sobre éstas por parte de quienes sean o hayan sido sus cónyuges o de quienes estén o hayan estado ligados a ellas por relaciones similares de afectividad, aun sin convivencia»."
  },
  {

      "Establecer un sistema de penas más severas para los delitos de violencia doméstica",

    c: 0,
    exp: "<strong>Respuesta correcta: A.</strong> El art. 1.2 LO 1/2004 establece que la finalidad de las medidas es «prevenir, sancionar y erradicar esta violencia y prestar asistencia a las mujeres, a sus hijos menores y a los menores sujetos a su tutela, o guarda y custodia, víctimas de esta violencia». La protección alcanza también a los menores a cargo de la víctima."

      "La violencia física, psicológica y económica ejercida en el ámbito del hogar",

    exp: "<strong>Respuesta correcta: C.</strong> El art. 2.f) LO 1/2004 establece que «la Administración General del Estado, a través de la Delegación Especial del Gobierno contra la Violencia sobre la Mujer, en colaboración con el Observatorio Estatal de la Violencia sobre la Mujer, impulse la creación de políticas públicas dirigidas a ofrecer tutela a las víctimas»."

  },

  /* ══ PREGUNTAS DE SÍNTESIS Y DISTINCIÓN ══ */
  {
    p: "¿Cuál es la diferencia fundamental entre la discriminación directa (art. 6.1 LO 3/2007) y la discriminación por embarazo o maternidad (art. 8 LO 3/2007)?",
    ops: [
      "No hay diferencia; el art. 8 es simplemente una reiteración del art. 6.1 aplicada a un supuesto específico que el legislador quiso destacar expresamente como discriminación directa",
      "La discriminación directa puede admitir justificación si hay requisito profesional esencial; la discriminación por embarazo es absoluta y no admite ninguna justificación",
      "La discriminación del art. 8 es indirecta porque afecta solo a las mujeres embarazadas",
      "El art. 6.1 es más amplio y el art. 8 solo protege durante la baja por maternidad"
    ],
    c: 0,
    exp: "<strong>Respuesta correcta: A.</strong> El art. 8 LO 3/2007 especifica que el trato desfavorable por embarazo o maternidad es una forma de discriminación directa por razón de sexo. No añade un tipo nuevo, sino que subraya que este supuesto concreto —históricamente frecuente— es siempre discriminación directa, sin posibilidad de justificación, dado que el embarazo es una condición exclusivamente femenina."
  },

  {

    c: 1,

      "La inversión de la carga de la prueba no se aplica a los procesos penales",

/* ── LÓGICA ── */
let orden = [], respondidas = 0, aciertos = 0, errores = 0;
const TOTAL = BANCO.length;

document.getElementById('totalLabel').textContent = '📋 ' + TOTAL + ' preguntas';
document.getElementById('barraNum').textContent = '0 / ' + TOTAL;

function mezclar(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function actualizarBarra() {
  document.getElementById('barraFill').style.width = ((respondidas / TOTAL) * 100) + '%';
  document.getElementById('barraNum').textContent = respondidas + ' / ' + TOTAL;
  document.getElementById('scoreOk').textContent = '✓ ' + aciertos;
  document.getElementById('scoreKo').textContent = '✗ ' + errores;
}

function construirPreguntas() {
  orden = mezclar([...Array(TOTAL).keys()]);
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  const letras = ['A', 'B', 'C', 'D'];

  orden.forEach((idx, pos) => {
    const q = BANCO[idx];
    const opsOrden = mezclar([0, 1, 2, 3]);
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + pos;

    const numDiv = document.createElement('div');
    numDiv.className = 'card-num';
    numDiv.textContent = 'Pregunta ' + (pos + 1);

    const pregDiv = document.createElement('div');
    pregDiv.className = 'card-pregunta';
    pregDiv.textContent = q.p;

    const opcionesDiv = document.createElement('div');
    opcionesDiv.className = 'opciones';

    opsOrden.forEach((opIdx, i) => {
      const btn = document.createElement('button');
      btn.className = 'opcion';
      btn.dataset.correcto = (opIdx === q.c) ? '1' : '0';
      btn.dataset.pos = pos;
      btn.innerHTML = '<span class="letra">' + letras[i] + '</span><span>' + q.ops[opIdx] + '</span>';
      btn.addEventListener('click', onOpcionClick);
      opcionesDiv.appendChild(btn);
    });

    const expDiv = document.createElement('div');
    expDiv.className = 'explicacion';
    expDiv.id = 'exp-' + pos;
    expDiv.innerHTML = q.exp;

    card.appendChild(numDiv);
    card.appendChild(pregDiv);
    card.appendChild(opcionesDiv);
    card.appendChild(expDiv);
    main.appendChild(card);
  });

  const res = document.createElement('div');
  res.className = 'resultado';
  res.id = 'resultado';
  res.innerHTML = `
    <div class="resultado-eyebrow">Resultado final</div>
    <h2>Test completado</h2>
    <div class="resultado-nota"><span id="rNota">-</span><span style="font-size:1.5rem;color:var(--texto-suave)">/10</span></div>
    <div id="rBadge" class="calif-badge"></div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="rOk" style="color:var(--verde)">-</div><div class="stat-lab">Correctas</div></div>
      <div class="stat"><div class="stat-num" id="rKo" style="color:var(--rojo)">-</div><div class="stat-lab">Erróneas</div></div>
      <div class="stat"><div class="stat-num" id="rPct">-</div><div class="stat-lab">% Acierto</div></div>
    </div>
    <p class="resultado-hint">Revisa las explicaciones en cada pregunta para reforzar los conceptos.</p>
    <button class="btn btn-naranja" onclick="reiniciar()">🔄 Nuevo intento</button>
  `;
  main.appendChild(res);
}

function onOpcionClick(e) {
  const btn = e.currentTarget;
  const pos = parseInt(btn.dataset.pos);
  const card = document.getElementById('card-' + pos);
  card.querySelectorAll('.opcion').forEach(b => {
    b.disabled = true;
    if (b.dataset.correcto === '1') b.classList.add('correcta');
    else if (b === btn) b.classList.add('incorrecta');
  });
  document.getElementById('exp-' + pos).classList.add('visible');
  if (btn.dataset.correcto === '1') aciertos++; else errores++;
  respondidas++;
  actualizarBarra();
  if (respondidas === TOTAL) mostrarResultado();
}

function mostrarResultado() {
  const nota = ((aciertos / TOTAL) * 10).toFixed(1);
  const pct = Math.round((aciertos / TOTAL) * 100);
  let badge = '', color = '';
  if (pct >= 90)      { badge = '🏆 Sobresaliente'; color = '#166534'; }
  else if (pct >= 70) { badge = '✅ Notable';        color = '#1d4ed8'; }
  else if (pct >= 50) { badge = '⚠️ Aprobado';      color = '#92400e'; }
  else                { badge = '❌ Suspenso';       color = '#991b1b'; }
  document.getElementById('rNota').textContent = nota;
  document.getElementById('rOk').textContent = aciertos;
  document.getElementById('rKo').textContent = errores;
  document.getElementById('rPct').textContent = pct + '%';
  const badgeEl = document.getElementById('rBadge');
  badgeEl.textContent = badge;
  badgeEl.style.cssText += `;background:${color}22;color:${color};border:1px solid ${color}44`;
  const res = document.getElementById('resultado');
  res.classList.add('visible');
  setTimeout(() => res.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function reiniciar() {
  respondidas = 0; aciertos = 0; errores = 0;
  actualizarBarra();
  construirPreguntas();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

construirPreguntas();
</script>
